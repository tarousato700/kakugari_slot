<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>かくがりスロット モバイル版</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        h1 { font-size: 1.2rem; color: #ffcc00; margin: 10px 0; }

        #slot-container {
            width: 95%;
            max-width: 400px;
            background: linear-gradient(145deg, #444, #111);
            padding: 15px;
            border: 4px solid #ffcc00;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            box-sizing: border-box;
        }

        canvas {
            width: 100%;
            height: auto;
            background-color: #000;
            display: block;
            border-radius: 5px;
            border: 2px solid #222;
        }

        .controls {
            margin-top: 20px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        #spinBtn {
            width: 80%;
            padding: 18px;
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
            background: #e63946;
            border: none;
            border-radius: 50px;
            box-shadow: 0 5px #900;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        #spinBtn:active {
            transform: translateY(3px);
            box-shadow: 0 2px #900;
        }

        #spinBtn:disabled {
            background: #555;
            box-shadow: none;
            color: #aaa;
        }

        #status {
            font-size: 0.9rem;
            color: #ffcc00;
            font-weight: bold;
            min-height: 1.2em;
        }

        /* ログ確認用（不要になったら消せます） */
        #debug-log {
            width: 90%;
            font-size: 10px;
            color: #0f0;
            background: #000;
            padding: 5px;
            margin-top: 10px;
            border-radius: 5px;
            text-align: left;
            max-height: 80px;
            overflow-y: auto;
        }
    </style>
</head>
<body>

    <h1>かくがりスロット</h1>

    <div id="slot-container">
        <canvas id="slotCanvas" width="300" height="400"></canvas>
    </div>

    <div class="controls">
        <button id="spinBtn" disabled>画像ロード中...</button>
        <div id="status"></div>
    </div>

    <div id="debug-log">Log: Initializing...</div>

    <script>
        const canvas = document.getElementById('slotCanvas');
        const ctx = canvas.getContext('2d');
        const spinBtn = document.getElementById('spinBtn');
        const statusText = document.getElementById('status');
        const debugLog = document.getElementById('debug-log');

        function addLog(msg) {
            debugLog.innerHTML += `<br>> ${msg}`;
            debugLog.scrollTop = debugLog.scrollHeight;
        }

        // 画像リスト（1.tiff に対応）
        const slotItems = [
            { id: 1, name: "ノーマルかくがり", src: "1.tiff" },
            { id: 2, name: "着ぐるみかくがり", src: "2.jpg" },
            { id: 3, name: "見つめかくがり", src: "3.jpg" },
            { id: 4, name: "子連れかくがり", src: "4.jpg" },
            { id: 5, name: "カニがり", src: "5.jpg" },
            { id: 6, name: "金のかくがり", src: "6.jpg" }
        ];

        const images = [];
        let reels = [0, 1, 2];
        let isSpinning = false;
        let loadedCount = 0;

        // 画像のプリロード
        slotItems.forEach((item, index) => {
            const img = new Image();
            // キャッシュ回避のタイムスタンプ付与
            img.src = item.src + "?v=" + Date.now();
            
            img.onload = () => {
                loadedCount++;
                images[index] = img;
                addLog(`Loaded: ${item.src} (${img.width}x${img.height})`);
                if (loadedCount === slotItems.length) {
                    initGame();
                }
                draw();
            };

            img.onerror = () => {
                loadedCount++;
                addLog(`Error: ${item.src} not found.`);
                if (loadedCount === slotItems.length) initGame();
            };
        });

        function initGame() {
            spinBtn.disabled = false;
            spinBtn.innerText = "回す！";
            statusText.innerText = "準備完了";
            addLog("Game Ready.");
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            reels.forEach((imgIndex, i) => {
                const x = i * 100;
                const img = images[imgIndex];
                
                if (img) {
                    // 縦横比 3:4 (1500x2000) を守って描画
                    const drawW = 90;
                    const drawH = drawW * (2000 / 1500); // 120px
                    const y = (canvas.height - drawH) / 2;
                    ctx.drawImage(img, x + 5, y, drawW, drawH);
                } else {
                    // 画像がない場合のプレースホルダー
                    ctx.fillStyle = "#333";
                    ctx.fillRect(x + 5, 140, 90, 120);
                    ctx.fillStyle = "white";
                    ctx.font = "20px bold Arial";
                    ctx.textAlign = "center";
                    ctx.fillText(imgIndex + 1, x + 50, 205);
                }
            });

            // リールの区切り線
            ctx.strokeStyle = "rgba(255,204,0,0.3)";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(100, 0); ctx.lineTo(100, 400);
            ctx.moveTo(200, 0); ctx.lineTo(200, 400);
            ctx.stroke();
        }

        function spin() {
            if (isSpinning) return;
            isSpinning = true;
            spinBtn.disabled = true;
            statusText.innerText = "抽選中...";

            let count = 0;
            const maxCounts = 25;

            const timer = setInterval(() => {
                reels = reels.map(() => Math.floor(Math.random() * slotItems.length));
                draw();
                count++;

                if (count >= maxCounts) {
                    clearInterval(timer);
                    isSpinning = false;
                    spinBtn.disabled = false;
                    checkWin();
                }
            }, 60);
        }

        function checkWin() {
            const r1 = reels[0], r2 = reels[1], r3 = reels[2];
            if (r1 === r2 && r2 === r3) {
                statusText.innerText = `🎉 当たり！【${slotItems[r1].name}】 🎉`;
            } else {
                statusText.innerText = "残念！ハズレ";
            }
        }

        spinBtn.addEventListener('click', spin);
        
        // 初回描画
        draw();
    </script>
</body>
</html>
