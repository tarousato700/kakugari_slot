<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>かくがりスロットver1.1.0</title>
    <style>
        :root { 
            --rainbow: linear-gradient(124deg, #ff2400, #e81d1d, #e8b71d, #e3e81d, #1de840, #1ddde8, #2b1de8, #dd00f3); 
        }
        
        body {
            background-color: #1a1a1a; color: white; font-family: sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; overflow: hidden;
            /* 背景アニメーションのトランジション */
            transition: background 0.5s ease;
        }

        /* 【重要】確変時：画面全体を虹色にするアニメーションクラス */
        .kakuhen-active {
            animation: rainbow-bg 0.3s linear infinite !important;
            background-size: 800% 800% !important;
            background: var(--rainbow) !important;
        }
        @keyframes rainbow-bg {
            0%{background-position:0% 80%} 50%{background-position:100% 20%} 100%{background-position:0% 80%}
        }

        .main-wrapper {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            width: 100%; max-width: 400px; gap: 15px; padding-bottom: 5vh;
            position: relative; z-index: 10; /* 虹色背景より前に出す */
        }

        h1 { margin: 0 0 10px 0; font-size: 1.8rem; color: #ffcc00; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }

        #slot-container {
            width: 90%; background: #222; padding: 12px;
            border: 4px solid #ffcc00; border-radius: 20px; position: relative; z-index: 11;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }

        /* スロットの内部背景は白 */
        canvas { width: 100%; height: auto; background: #fff; display: block; border-radius: 10px; }

        .controls { width: 100%; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 15px; z-index: 11; }

        #spinBtn {
            width: 85%; padding: 16px; font-size: 1.6rem; font-weight: bold;
            background: #e63946; color: white; border: none; border-radius: 50px;
            box-shadow: 0 6px #900; cursor: pointer; -webkit-tap-highlight-color: transparent;
            transition: transform 0.1s;
        }
        #spinBtn:active { transform: translateY(3px); box-shadow: 0 3px #900; }
        #spinBtn:disabled { background: #555; box-shadow: none; color: #888; transform: none; }

        #status { 
            font-size: 1.6rem; font-weight: 900; color: #ffcc00; 
            min-height: 1.8em; text-shadow: 2px 2px 0px #000;
            display: flex; align-items: center; justify-content: center;
        }

        /* 演出用 */
        #effect-layer { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 1000; display: none; }
        .pop-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-weight: 900; white-space: nowrap; z-index: 1100; text-align: center; animation: text-pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .cola-style { font-size: 3.5rem; color: #ffd700; text-shadow: 0 0 15px #fff, 4px 4px 0 #8b4513; }
        .win-style { font-size: 3rem; color: #fff; text-shadow: 0 0 20px #ff0000, 0 0 10px #ffcc00; }
        @keyframes text-pop { 0% { scale: 0; opacity: 0; } 100% { scale: 1; opacity: 1; } }

        .shooting-img { position: absolute; width: 100px; animation: shooting-anime 2.4s linear forwards; }
        @keyframes shooting-anime { 0% { transform: translate(120vw, -20vh) rotate(0deg); } 100% { transform: translate(-50vw, 120vh) rotate(-120deg); } }
        
        .yaruyan-img { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100px; z-index: 1200; filter: drop-shadow(0 0 10px #fff); animation: yaruyan-pop 0.5s cubic-bezier(0.19, 1, 0.22, 1) forwards; }
        @keyframes yaruyan-pop { 0% { scale: 0; opacity: 1; } 100% { scale: 2.5; opacity: 1; } }
        
        #freeze-mask { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2000; display: none; }
    </style>
</head>
<body>

    <div id="freeze-mask"></div>
    <div id="effect-layer"></div>

    <div class="main-wrapper">
        <h1>かくがりスロット</h1>
        <div id="slot-container">
            <canvas id="slotCanvas" width="300" height="400"></canvas>
        </div>
        <div class="controls">
            <div id="status">LOADING...</div>
            <button id="spinBtn" disabled>スピン！</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('slotCanvas');
        const ctx = canvas.getContext('2d');
        const spinBtn = document.getElementById('spinBtn');
        const effectLayer = document.getElementById('effect-layer');
        const freezeMask = document.getElementById('freeze-mask');
        const statusText = document.getElementById('status');

        const slotItems = [
            { name: "ノーマルかくがり", src: "normalk.jpg" },
            { name: "着ぐるみかくがり", src: "kigurimik.png" },
            { name: "見つめかくがり", src: "mitsumek.png" },
            { name: "子連れかくがり", src: "kodurek.png" },
            { name: "カニがり", src: "kanik.png" },
            { name: "金のかくがり", src: "goldk.png" }
        ];
        
        const kakuhenImgSrc = "kakuhen.png";
        const yaruyanImgSrc = "yaruyan.png";
        let images = [];
        let loadedCount = 0;
        // 初期状態をnullにする（画像がない状態）
        let reels = [null, null, null]; 

        function vibrate(pattern) { if ("vibrate" in navigator) navigator.vibrate(pattern); }

        // 画像ロード判定（エラー無視）
        function checkReady() {
            loadedCount++;
            if (loadedCount >= slotItems.length + 2) {
                spinBtn.disabled = false;
                statusText.innerText = "READY";
                // 準備ができたら初期画像をセット
                reels = [0, 1, 2];
                draw();
            }
        }

        slotItems.forEach((item, i) => {
            const img = new Image();
            img.onload = checkReady;
            img.onerror = () => { console.error(item.src + " fail"); checkReady(); };
            img.src = item.src;
            images[i] = img;
        });

        const kakuhenImg = new Image(); kakuhenImg.onload = checkReady; kakuhenImg.onerror = checkReady; kakuhenImg.src = kakuhenImgSrc;
        const yaruyanImg = new Image(); yaruyanImg.onload = checkReady; yaruyanImg.onerror = checkReady; yaruyanImg.src = yaruyanImgSrc;

        function draw() {
            // 背景消去
            ctx.clearRect(0, 0, 300, 400);

            // リールの描画
            reels.forEach((idx, i) => {
                if (idx !== null && images[idx] && images[idx].complete) {
                    ctx.drawImage(images[idx], i * 100 + 5, 140, 90, 120);
                } else {
                    // 【修正】画像がない場合の代わりを「灰色」から「白」へ
                    ctx.fillStyle = "#fff"; 
                    ctx.fillRect(i * 100 + 5, 140, 90, 120);
                }
            });

            // 枠線を描画（濃い目のグレー）
            ctx.strokeStyle = "#ddd"; ctx.lineWidth = 3; ctx.beginPath();
            ctx.moveTo(100, 0); ctx.lineTo(100, 400);
            ctx.moveTo(200, 0); ctx.lineTo(200, 400);
            ctx.strokeRect(0, 0, 300, 400);
            ctx.stroke();
        }

        async function spin() {
            vibrate(10);
            spinBtn.disabled = true;
            statusText.innerText = "抽選中...";
            effectLayer.style.display = "none";
            
            let count = 0;
            const timer = setInterval(() => {
                reels = reels.map(() => Math.floor(Math.random() * slotItems.length));
                draw();
                if (++count > 25) {
                    clearInterval(timer);
                    processResult();
                }
            }, 50);
        }

        async function processResult() {
            const r = reels;
            const isReach = (r[0] === r[1] || r[1] === r[2] || r[0] === r[2]);
            const isWin = (r[0] === r[1] && r[1] === r[2]);

            // 確変判定（1/7）
            if (isReach && !isWin && Math.random() < 1/7) {
                await startKakuhenEffect();
                const winIdx = (r[0] === r[1] || r[0] === r[2]) ? r[0] : r[1];
                reels = [winIdx, winIdx, winIdx];
                draw();
                handleWin(winIdx);
            } else if (isWin) {
                handleWin(r[0]);
            } else {
                statusText.innerText = "ハズレ";
            }
            spinBtn.disabled = false;
        }

        async function handleWin(winIdx) {
            if (winIdx === 5) {
                await startGoldWinEffect();
            } else {
                vibrate(200);
                showWinName(slotItems[winIdx].name);
            }
        }

        function showWinName(name) {
            effectLayer.style.display = "block";
            effectLayer.innerHTML = `<div class="pop-text win-style">${name}</div>`;
            statusText.innerText = `🎉 当たり 🎉`;
        }

        function startGoldWinEffect() {
            return new Promise(resolve => {
                freezeMask.style.display = "block";
                // 背景を金に
                document.body.style.background = "#FFD700"; 
                effectLayer.style.display = "block";
                let count = 0;
                const interval = setInterval(() => {
                    if (count < 5) {
                        effectLayer.innerHTML = `<img src="${yaruyanImgSrc}" class="yaruyan-img" style="display:block;">`;
                        vibrate(150);
                        count++;
                    } else {
                        clearInterval(interval);
                        setTimeout(() => {
                            // 背景を元に戻す
                            document.body.style.background = "#1a1a1a"; 
                            freezeMask.style.display = "none";
                            statusText.innerText = "伝説のやるやん！";
                            resolve();
                        }, 500);
                    }
                }, 500);
            });
        }

        function startKakuhenEffect() {
            return new Promise(resolve => {
                freezeMask.style.display = "block";
                // 【修正】CSSアニメーションクラスを追加
                document.body.classList.add('kakuhen-active'); 
                
                effectLayer.style.display = "block";
                effectLayer.innerHTML = '<div class="pop-text cola-style">コーラ投入！！</div>';
                vibrate([100, 50, 100, 50, 100, 50, 100, 50]);

                for (let i = 0; i < 75; i++) {
                    setTimeout(() => {
                        const img = document.createElement('img');
                        img.src = kakuhenImg.src;
                        img.className = 'shooting-img';
                        img.style.left = (Math.random() * 150 - 30) + "vw";
                        img.style.top = (Math.random() * 40 - 20) + "vh";
                        img.style.width = (80 + Math.random() * 120) + "px";
                        effectLayer.appendChild(img);
                    }, i * 35);
                }

                setTimeout(() => {
                    // 【修正】アニメーションクラスを削除
                    document.body.classList.remove('kakuhen-active'); 
                    // 背景をデフォルトに戻す
                    document.body.style.background = "#1a1a1a"; 
                    effectLayer.innerHTML = "";
                    freezeMask.style.display = "none";
                    resolve();
                }, 4500);
            });
        }

        spinBtn.onclick = spin;
        // 初回描画（準備中なので白スロット）
        draw(); 
    </script>
</body>
</html>
