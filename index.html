<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>診断モード付スロット</title>
    <style>
        body { background: #222; color: #fff; text-align: center; font-family: sans-serif; }
        canvas { background: #000; width: 90%; max-width: 300px; height: auto; border: 2px solid gold; }
        #debug-log { background: #000; color: #0f0; text-align: left; padding: 10px; font-size: 12px; margin-top: 20px; overflow-y: scroll; height: 150px; }
    </style>
</head>
<body>

    <h2>スロット診断モード</h2>
    <canvas id="slotCanvas" width="300" height="400"></canvas>
    <div>
        <button id="spinBtn" style="padding:20px; width:80%; font-size:20px;">回す</button>
    </div>

    <div id="debug-log">【システムログ】<br></div>

    <script>
        const log = document.getElementById('debug-log');
        function addLog(msg) { log.innerHTML += msg + "<br>"; }

        const canvas = document.getElementById('slotCanvas');
        const ctx = canvas.getContext('2d');
        
        // あなたの指定したファイル名
        const slotItems = [
            { name: "ノーマル", src: "1.jpg" },
            { name: "着ぐるみ", src: "2.jpg" },
            { name: "見つめ", src: "3.jpg" },
            { name: "子連れ", src: "4.jpg" },
            { name: "カニ", src: "5.jpg" },
            { name: "金", src: "6.jpg" }
        ];

        const images = [];
        let loadedCount = 0;

        addLog("画像読み込み開始...");

        slotItems.forEach((item, index) => {
            const img = new Image();
            img.src = item.src;
            img.onload = () => {
                loadedCount++;
                images[index] = img;
                addLog(`✅ 成功: ${item.src} (${img.width}x${img.height})`);
                if(loadedCount === slotItems.length) addLog("🎉 全画像完了！");
                draw();
            };
            img.onerror = () => {
                addLog(`❌ 失敗: ${item.src} が見つかりません`);
            };
        });

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            [0, 1, 2].forEach((pos, i) => {
                const img = images[pos];
                if (img) {
                    ctx.drawImage(img, i * 100 + 5, 100, 90, 120);
                } else {
                    ctx.strokeStyle = "white";
                    ctx.strokeRect(i * 100 + 5, 100, 90, 120);
                    ctx.fillText(pos + 1, i * 100 + 45, 160);
                }
            });
        }

        // 簡易スピン
        document.getElementById('spinBtn').onclick = () => {
            const r = () => Math.floor(Math.random() * 6);
            const reels = [r(), r(), r()];
            addLog(`スピン結果: ${reels.map(n => n+1).join('-')}`);
            // 描画更新（簡略版）
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            reels.forEach((imgIdx, i) => {
                const img = images[imgIdx];
                if(img) ctx.drawImage(img, i * 100 + 5, 100, 90, 120);
            });
        };
    </script>
</body>
</html>
